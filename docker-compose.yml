services:
  deepwiki:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8001}:${PORT:-8001}"  # API port
    # Backend-only image. The frontend is the Nuxt app in web/ (run on the host
    # with `cd web && npm run dev` -> http://localhost:3001).
    command: ["python", "-m", "api.main", "--port", "8001"]
    env_file:
      - .env
    environment:
      - PORT=${PORT:-8001}
      - SERVER_BASE_URL=http://localhost:${PORT:-8001}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FILE_PATH=${LOG_FILE_PATH:-api/logs/application.log}
    volumes:
      - ~/.adalflow:/root/.adalflow      # Persist repository and embedding data
      - ./api/logs:/app/api/logs          # Persist log files across container restarts
    # Resource limits for docker-compose up (not Swarm mode)
    mem_limit: 6g
    mem_reservation: 2g
    # Health check configuration
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8001}/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---- AI研发管理平台 backend services (docs/admin-phase1-plan.md §3.1) ----

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-devroot}
    ports:
      - "3307:3306"   # 宿主 3306 已被本机 MySQL 占用；SQL 客户端连 localhost:3307，容器间仍走 mysql:3306
    volumes:
      - mysql-data:/var/lib/mysql
      - ./services/mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  requirement:
    build:
      context: ./services/requirement
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-devroot}@mysql:3306/requirement_db
      DB_AUTO_CREATE: "true"   # dev only; production runs alembic migrations
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET:-}
      # 可行性分析任务在 api 服务（deepwiki）执行，完成后回调本服务
      ANALYSIS_BASE_URL: http://deepwiki:8001
      CALLBACK_BASE_URL: http://requirement:8002
    depends_on:
      mysql:
        condition: service_healthy

  identity:
    build:
      context: ./services/identity
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-devroot}@mysql:3306/identity_db
      DB_AUTO_CREATE: "true"   # dev only; production runs alembic migrations
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET:-}
      # LDAP 唯一认证源（无本地回退），直接对接企业 LDAP/AD：在根目录 .env 配置以下变量。
      # LDAP_URL 留空 = 登录接口一律 503。AD 域把过滤器换成 (sAMAccountName={username})；
      # ldaps 自签/内部 CA 时挂载证书并设 LDAP_CA_CERT_FILE。
      LDAP_URL: ${LDAP_URL:-}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-}
      LDAP_BIND_DN: ${LDAP_BIND_DN:-}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD:-}
      LDAP_USER_FILTER: ${LDAP_USER_FILTER:-(uid={username})}
      LDAP_ATTR_DISPLAY: ${LDAP_ATTR_DISPLAY:-displayName}
      LDAP_ATTR_EMAIL: ${LDAP_ATTR_EMAIL:-mail}
      LDAP_CA_CERT_FILE: ${LDAP_CA_CERT_FILE:-}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
